name: Link health

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Amazon links
        run: python scripts/link-health.py --domain www.amazon.co.uk --delay 0.4
